services:
  demo:
    build:
      context: .
      dockerfile: Dockerfile.demo
    ports:
      - "8000:8000"
    volumes:
      - demo-media:/app/demo/media
      - demo-db:/app/demo
    environment:
      - DJANGO_SETTINGS_MODULE=demo_project.settings
      - PYTHONPATH=/app/src:.
    command: >
      sh -c "
        cd /app/demo &&
        python manage.py migrate --run-syncdb &&
        python manage.py seed_demo --fast &&
        python manage.py runserver 0.0.0.0:8000
      "

volumes:
  demo-media:
  demo-db:
