name: CI

on:
  push:
  pull_request:
  workflow_call: {}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src/ tests/ demo/

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        django-version: ["4.2", "5.0", "5.1"]
        exclude:
          # Django 5.0 dropped support before Python 3.13 was released
          - python-version: "3.13"
            django-version: "5.0"
          # Django 4.2 didn't officially support 3.13 until later point releases
          - python-version: "3.13"
            django-version: "4.2"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Pin Django ${{ matrix.django-version }}
        run: uv pip install "django~=${{ matrix.django-version }}.0"

      - name: Run tests
        run: uv run pytest --cov --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12' && matrix.django-version == '5.1'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
